---
name: Publish Container Images
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  # Required by actions/checkout to read repository sources.
  contents: read
  # Required by docker/build-push-action to publish images to GHCR.
  packages: write

env:
  REGISTRY: ghcr.io
  AGENT_IMAGE: ghcr.io/rackslab/slurm-web-agent
  GATEWAY_IMAGE: ghcr.io/rackslab/slurm-web-gateway

jobs:
  publish:
    name: Build and push images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags and OCI labels for each image from the git tag that
      # triggered the workflow:
      # - full semantic version, for example 7.0.0
      # - floating minor release tag, for example 7.0
      # - moving latest tag for the latest published release
      # - source git tag preserved as an image tag
      - name: Extract Docker metadata (agent)
        id: meta-agent
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AGENT_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=ref,event=tag

      - name: Extract Docker metadata (gateway)
        id: meta-gateway
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GATEWAY_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=ref,event=tag

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the role-specific targets from containers/Dockerfile and push them
      # to GHCR with the tags and labels generated above. Each image uses a
      # dedicated GitHub Actions cache scope so agent and gateway layers are
      # restored and updated independently between release builds.
      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile
          target: agent
          push: true
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}
          cache-from: type=gha,scope=slurm-web-agent
          cache-to: type=gha,mode=max,scope=slurm-web-agent

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile
          target: gateway
          push: true
          tags: ${{ steps.meta-gateway.outputs.tags }}
          labels: ${{ steps.meta-gateway.outputs.labels }}
          cache-from: type=gha,scope=slurm-web-gateway
          cache-to: type=gha,mode=max,scope=slurm-web-gateway
