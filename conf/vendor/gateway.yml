service:
  interface:
    type: str
    default: localhost
    doc: |
      Address of network interfaces to bind native service for incoming
      connections. Special value `0.0.0.0` means all network interfaces.
  port:
    type: int
    default: 5011
    doc: TCP port to listen for incoming connections.
  cors:
    type: bool
    default: false
    doc: When true, Cross-Origin Resource Sharing (CORS) headers are enabled.
  debug:
    type: bool
    default: false
    doc: Enable debug mode
  log_flags:
    type: list
    content: str
    default:
    - ALL
    choices:
    - slurmweb
    - rfl
    - werkzeug
    - urllib3
    - racksdb
    - ALL
    doc: List of log flags to enable. Special value `ALL` enables all log flags.
  debug_flags:
    type: list
    content: str
    default:
    - slurmweb
    choices:
    - slurmweb
    - rfl
    - werkzeug
    - urllib3
    - racksdb
    - ALL
    doc: |
      List of debug flags to enable. Special value `ALL` enables all debug
      flags.
  session_key:
    type: path
    default: /var/lib/slurm-web/session.key
    doc: |
      Path to file with the secret key used to protect server-side sessions
      during authentication.
    ex: /var/lib/slurm-web/session.key

ui:
  host:
    type: uri
    doc: |
      Public URL to access the gateway component. This is used to setup the
      frontend application with base URL to gateway endpoints. The path part is
      used to replace the base path placeholder in pre-built UI assets at
      runtime. When path is defined in the URI, it is also used to wrap all
      gateway endpoints under it.
    ex: https://dashboard.corp.com/
  enabled:
    type: bool
    default: true
    doc: Serve frontend application with gateway
  path:
    type: path
    default: /usr/share/slurm-web/frontend
    doc: Path to Slurm-web frontend application
  templates:
    type: path
    default: /usr/share/slurm-web/templates
    doc: |
      Path HTML templates folder.
  message_template:
    type: path
    default: message.html.j2
    doc: |
      Path to service message HTML template relative to the templates folder.
  message_login:
    type: path
    default: /etc/slurm-web/messages/login.md
    doc: |
      Path to service message presented to users below the login form. Slurm-web
      loads the file if it exists. However, it does not fail if file is not
      found, it is skipped silently. The content must be formatted in markdown.
  hide_denied:
    type: bool
    default: false
    doc: |
      Control if users can see the list of denied clusters, ie. clusters on
      which they do not have any permission. When false, these clusters are
      visible and marked as denied for these users. When true, these clusters
      are hidden to these users.
  racksdb_rows_labels:
    type: bool
    default: false
    doc: |
      Enable racks rows labels in RacksDB infrastructure graphical
      representations.
  racksdb_racks_labels:
    type: bool
    default: false
    doc: |
      Enable racks labels in RacksDB infrastructure graphical representations.

agents:
  url:
    type: list
    content: uri
    required: true
    doc: List of Slurm-web agents URL
    ex:
    - https://cluster1/agent
    - https://cluster2/agent
  cacert:
    type: path
    doc: |
      Path to CA certificate used to validate signature of agent server
      certificate when using HTTPS. By default, system CA certificates are
      used.
    ex: /path/to/certificate.pem
  version:
    type: str
    default: 6.0.0
    doc: |
      Minimal support version of Slurm-web agent API

      CAUTION: You SHOULD NOT change this parameter unless you really know what
      you are doing. This parameter is more intented for Slurm-web developers
      rather than end users. Slurm-web is officially tested and validated with
      the default value only.
  racksdb_version:
    type: str
    default: 0.5.0
    doc: |
      Minimal supported version of RacksDB API

      CAUTION: You SHOULD NOT change this parameter unless you really know what
      you are doing. This parameter is more intented for Slurm-web developers
      rather than end users. Slurm-web is officially tested and validated with
      the default value only.

authentication:
  enabled:
    type: bool
    default: false
    doc: Determine if authentication is enabled
  method:
    type: str
    choices:
    - ldap
    - oidc
    default: ldap
    doc: Authentification method

oidc:
  _doc: |
    Parameters in this section apply when `authentication` > `method` is set to
    `oidc`. Slurm-web uses the OAuth 2.0 authorization code flow to authenticate
    users against an OpenID Connect provider such as Keycloak or Authentik. Enable
    PKCE with the optional `pkce` parameter (`S256` or `plain`).

    Register the redirect URI `{ui.host}/api/oidc/callback` (including any path
    prefix defined in `ui.host`) in the identity provider. Map user groups into
    the ID token or userinfo endpoint under the configured `groups_claim` for RBAC
    in the policy file.

    For setup instructions, see xref:conf:auth/oidc.adoc[].
  issuer:
    type: uri
    doc: OIDC issuer URL used for discovery
    ex: https://idp.example.com/realms/org
  client_id:
    type: str
    doc: OIDC client identifier
  client_secret:
    type: password
    doc: |
      OIDC client secret for confidential clients. Optional for public clients
      (omit `client_secret` and `client_secret_file`; `pkce` must then be set).
    ex: SECR3T
  client_secret_file:
    type: path
    doc: |
      As an alternative to `client_secret` parameter, path to a separate file to
      read OIDC client secret from. When this parameter is defined, the
      `client_secret` parameter is ignored. Optional for public clients.
    ex: /etc/slurm-web/oidc_client_secret
  redirect_uri:
    type: uri
    doc: |
      OIDC redirect URI registered at the identity provider. When not defined,
      it is automatically derived from `ui.host` with path `/api/oidc/callback`.
  scope:
    type: str
    default: openid profile email
    doc: OIDC authorization scopes
  subject_claim:
    type: str
    default: sub
    doc: Claim used as user login in Slurm-web
  fullname_claim:
    type: str
    default: name
    doc: Claim used as user full name in Slurm-web
  groups_claim:
    type: str
    default: groups
    doc: |
      Claim used for user groups in Slurm-web RBAC. When empty, groups are not
      retrieved from userinfo endpoint.
  restricted_groups:
    type: list
    content: str
    doc: |
      List of user groups allowed to connect. When this parameter is not
      defined, all authenticated OIDC users are authorized to sign in.
    ex:
    - admins
    - biology
  pkce:
    type: str
    choices:
    - S256
    - plain
    doc: |
      PKCE code challenge method for the authorization code flow. When not
      defined, PKCE is disabled (typical for confidential clients). Use S256
      (recommended). `plain` is supported for legacy identity providers only.
      Required for public clients (no client secret).
  verify_ssl:
    type: bool
    default: true
    doc: Verify TLS certificate when connecting to OIDC provider
  cacert:
    type: path
    doc: |
      Path to CA certificate used to validate signature of OIDC provider
      certificate. When not defined, the default system CA certificates is used.
    ex: /path/to/certificate.pem

ldap:
  _doc: |
    Parameters in this section apply when `authentication` > `method` is set to
    `ldap` (the default). The gateway validates username and password against the
    LDAP directory and retrieves group memberships at login.

    For setup instructions, see xref:conf:auth/ldap.adoc[].
  uri:
    type: uri
    doc: URI to connect to LDAP server
    ex: ldap://localhost
  cacert:
    type: path
    doc: |
      Path to CA certificate used to validate signature of LDAP server
      certificate when using ldaps or STARTTLS protocols. When not defined, the
      default system CA certificates is used.
    ex: /path/to/certificate.pem
  starttls:
    type: bool
    default: false
    doc: Use STARTTLS protocol to negociate TLS connection with LDAP server
  user_base:
    type: str
    doc: Base DN for users entries
    ex: ou=people,dc=example,dc=org
  group_base:
    type: str
    doc: Base DN for group entries
    ex: ou=group,dc=example,dc=org
  user_class:
    type: str
    default: posixAccount
    doc: Class of user entries
  user_name_attribute:
    type: str
    default: uid
    doc: User entry attribute for user name
  user_fullname_attribute:
    type: str
    default: cn
    doc: User entry attribute for full name
  user_primary_group_attribute:
    type: str
    default: gidNumber
    doc: User entry attribute for primary group ID
  group_name_attribute:
    type: str
    default: cn
    doc: Group entry attribute for name
  group_object_classes:
    type: list
    content: str
    default:
    - posixGroup
    - groupOfNames
    doc: List of LDAP object classes for groups
  lookup_user_dn:
    type: bool
    default: true
    doc: |
      Lookup user DN in the scope of user base subtree. If disable, LDAP
      directory is not requested to search for the user in the subtree before
      authentication, and the user DN are considered to be in the form of
      `<user_name_attribute>=$login,<user_base>` (ex:
      `uid=$login,ou=people,dc=example,dc=org`). This notably implies all
      users entries to be at the first level under the user base in the tree.
  bind_dn:
    type: str
    doc: |
      DN used to bind to the LDAP server. When this parameter is not defined,
      access to LDAP directory is performed anonymously.
    ex: cn=system,ou=people,dc=example,dc=org
  bind_password:
    type: password
    doc: |
      Password of bind DN. This parameter is required when `bind_dn` is
      defined.
    ex: SECR3T
  bind_password_file:
    type: path
    doc: |
      As an alternative to `bind_password` parameter, path to a separate file to
      read bind DN password from. When this parameter is defined, the
      `bind_password` parameter is ignored.
    ex: /etc/slurm-web/ldap_password
  lookup_as_user:
    type: bool
    doc: |
      After successful user authentication, when this parameter is set to _yes_,
      Slurm-web retrieves user information and groups from LDAP directory with
      authenticated user permissions. When this parameter is set to _no_
      Slurm-web searches this information with service `bind_dn` and
      `bind_password` when defined or performs the operation anonymously. When
      this parameter is omitted in configuration (default), Slurm-web uses
      service `bind_dn` and `bind_password` when defined or authenticated user
      permissions as a fallback.
  restricted_groups:
    type: list
    content: str
    doc: |
      List of users groups allowed to connect. When this parameter is not
      defined, all users in LDAP directory are authorized to sign in.
    ex:
    - admins
    - biology

jwt:
  key:
    type: path
    default: /var/lib/slurm-web/jwt.key
    doc: Path to private key for JWT signature
  duration:
    type: int
    default: 1
    doc: JWT validity duration in days
  algorithm:
    type: str
    choices:
    # Full list available in PyJWT documentation:
    # https://pyjwt.readthedocs.io/en/latest/algorithms.html
    - HS256
    - HS384
    - HS512
    - ES256
    - ES256K
    - ES384
    - ES512
    - RS256
    - RS384
    - RS512
    - PS256
    - PS384
    - PS512
    - EdDSA
    default: HS256
    doc: Cryptographic algorithm used to sign JWT
  audience:
    type: str
    default: slurm-web
    doc: |
      Audience defined in generated JWT and expected in JWT provided by clients
