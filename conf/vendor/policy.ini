# Slurm-web default vendor RBAC policy. DO NOT MODIFY THIS FILE! Create a file
# /etc/slurm-web/policy.ini with your custom rules and Slurm-web will ignore
# this file. Your modifications in this file will be overwritten and lost on
# software upgrade.

[roles]
# Enable anonymous role with basic views
anonymous
# All authenticated users have the user role
user=ALL

[anonymous]
actions=stats-view,jobs-view,nodes-view

[user]
actions=stats-view,jobs-view,jobs-view-past,nodes-view,partitions-view,qos-view,accounts-view,associations-view,reservations-view,cache-view,cache-reset
